<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Adult ASA Link Survivor</title><meta name="viewport" content="width=device-width, initial-scale=1.0"/><style>
:root{--bg:#0b0d14;--panel-top:#171a20;--panel-bottom:#111318;--border:rgba(126,201,222,.08);--teal:#86c8da;--teal-soft:#d0eef5;--orange:#ff7a14;--text:#f4fbff;--muted:#9bc1cc}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,rgba(31,143,163,.08),transparent 28%),linear-gradient(180deg,#090b11 0%,#0b0d14 100%);color:white}header{padding:30px 20px;text-align:center;background:linear-gradient(90deg,#163e47,#214f59);box-shadow:0 8px 30px rgba(0,0,0,.35)}h1{margin:0;font-size:3rem;color:#dff8ff;letter-spacing:.5px}.sub{opacity:.95;margin-top:12px;line-height:1.5;color:#d0eef5}.wrap{max-width:1300px;margin:0 auto;padding:26px 18px 40px}.top-nav{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;margin:0 auto 26px}.top-nav-btn{display:inline-flex;align-items:center;justify-content:center;min-width:170px;padding:12px 18px;border-radius:999px;text-decoration:none;font-weight:700;font-size:.98rem;color:#f4fbff;background:linear-gradient(180deg,rgba(23,26,32,.96),rgba(17,19,24,.96));border:1px solid rgba(126,201,222,.14);box-shadow:0 0 16px rgba(0,0,0,.18),inset 0 0 0 1px rgba(255,255,255,.02);transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}.top-nav-btn:hover{transform:translateY(-1px);border-color:rgba(126,201,222,.28);box-shadow:0 0 20px rgba(0,0,0,.22),0 0 18px rgba(126,201,222,.08)}.top-nav-btn.primary{background:linear-gradient(90deg,rgba(126,201,222,.24),rgba(255,122,20,.18));border-color:rgba(126,201,222,.24)}.top-nav-btn.discord{background:linear-gradient(90deg,rgba(88,101,242,.22),rgba(126,201,222,.14));border-color:rgba(88,101,242,.28)}.panel{background:linear-gradient(180deg,var(--panel-top),var(--panel-bottom));border:1px solid var(--border);border-radius:22px;padding:28px;box-shadow:0 0 18px rgba(0,0,0,.18)}.panel h2{margin:0 0 12px;color:var(--teal);font-size:2rem}.panel p{color:#d8f6ff;line-height:1.7;margin:0}.quick-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:22px}.quick-card{background:rgba(255,255,255,.035);border:1px solid rgba(126,201,222,.10);border-radius:18px;padding:20px;text-align:left;color:#e8fbff}.quick-card strong{color:#ffb070}.copy-box{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}.copy-box code{padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#fff}.copy-btn{cursor:pointer;border-radius:999px;padding:10px 16px;font-weight:700;border:1px solid rgba(126,201,222,.18);background:linear-gradient(90deg,rgba(126,201,222,.22),rgba(255,122,20,.14));color:white}@media(max-width:700px){h1{font-size:2.35rem}.top-nav-btn{min-width:145px;padding:11px 15px;font-size:.92rem}}
</style></head><body><header><h1>Adult ASA Cluster</h1><div class="sub">Link your in-game survivor with Discord.</div></header><div class="wrap"><div class="top-nav" data-shared-nav data-page="link"></div><section class="panel"><h2>Link Survivor</h2><p>This page is staged for survivor linking. For now, players can copy the command below and run it in Discord. Later, this can become a full website-based Discord login flow.</p><div class="copy-box"><code id="linkCommand">/link your-survivor-name</code><button class="copy-btn" id="copyCommand">Copy command</button></div></section></div><script src="./shared-nav.js"></script><script>document.getElementById("copyCommand")?.addEventListener("click",async()=>{const t=document.getElementById("linkCommand").textContent;await navigator.clipboard.writeText(t);const b=document.getElementById("copyCommand");b.textContent="Copied";setTimeout(()=>b.textContent="Copy command",1200);});</script></body></html>
