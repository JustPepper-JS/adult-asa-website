<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Adult ASA Cluster</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      background: linear-gradient(90deg, #4b00ff, #8a2be2);
    }

    h1 {
      margin: 0;
      font-size: 3rem;
    }

    .sub {
      opacity: 0.95;
      margin-top: 12px;
      line-height: 1.5;
    }

    .sub-main {
      font-size: 1.2rem;
      font-weight: bold;
    }

    .sub-time {
      font-size: 0.95rem;
      opacity: 0.8;
    }

    .section {
      padding: 40px 20px;
    }

    .servers {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      max-width: 1150px;
      margin: 25px auto;
    }

    .card {
      background: #171717;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.04);
      text-align: left;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.06);
    }

    .card.active {
      border-color: rgba(0, 255, 136, 0.4);
      box-shadow: 0 0 16px rgba(0, 255, 136, 0.25);
    }

    .server-name {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 0.92rem;
      background: rgba(255, 255, 255, 0.06);
      color: #e9e9e9;
    }

    .pill.online {
      background: rgba(0, 255, 136, 0.12);
      color: #00ff88;
      font-weight: bold;
    }

    .pill.offline {
      background: rgba(255, 92, 92, 0.12);
      color: #ff5c5c;
      font-weight: bold;
    }

    .players-section {
      margin-top: 12px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .players-label {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .player-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .player-tag {
      display: inline-block;
      background: rgba(138, 43, 226, 0.25);
      border: 1px solid rgba(138, 43, 226, 0.35);
      color: #f2eaff;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.88rem;
      line-height: 1.2;
      word-break: break-word;
    }

    .player-tag.none {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.75);
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #8a2be2;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <header>
    <h1>Adult ASA Cluster</h1>
    <div class="sub" id="subtitle">
      <div class="sub-main">Loading live server data...</div>
      <div class="sub-time">Please wait a moment</div>
    </div>
  </header>

  <div class="section">
    <h2>🌍 Live Server Status</h2>
    <div id="servers" class="servers"></div>
    <a
      class="btn"
      href="https://discord.gg/adultasa"
      target="_blank"
      rel="noopener noreferrer"
    >
      Join Discord
    </a>
  </div>

  <div class="section">
    <h2>🔥 Why Play Here?</h2>
    <p>
      • Active community<br />
      • Balanced rates<br />
      • No wipes ever<br />
      • Cross-map transfers<br />
      • Admin support
    </p>
  </div>

  <footer>© 2026 Adult ASA Cluster</footer>

  <script>
    const API_URL = "https://aasa-discord-bot-v-20-production.up.railway.app/api/status";

    const SERVER_ORDER = [
      "Island",
      "Scorched Earth",
      "Aberration",
      "Extinction",
      "Ragnarok",
      "Valguero",
      "Astraeos",
      "Lost Colony"
    ];

    function cleanServerName(name) {
      let cleaned = String(name || "").replace(/^Adult ASA\s*-\s*/i, "").trim();

      if (cleaned === "SE") return "Scorched Earth";
      if (cleaned === "The Island") return "Island";

      return cleaned;
    }

    function sortServers(servers) {
      return [...servers].sort((a, b) => {
        const aName = cleanServerName(a.name);
        const bName = cleanServerName(b.name);

        const aIndex = SERVER_ORDER.indexOf(aName);
        const bIndex = SERVER_ORDER.indexOf(bName);

        if (aIndex === -1 && bIndex === -1) return aName.localeCompare(bName);
        if (aIndex === -1) return 1;
        if (bIndex === -1) return -1;

        return aIndex - bIndex;
      });
    }

    function renderSubtitle(totalOnline, updatedAt) {
      const subtitle = document.getElementById("subtitle");
      const updated = updatedAt
        ? new Date(updatedAt).toLocaleString()
        : "Unknown";

      subtitle.innerHTML = `
        <div class="sub-main">${totalOnline} Survivors Online</div>
        <div class="sub-time">Last updated: ${updated}</div>
      `;
    }

    function buildPlayerTags(playerNames) {
      if (!playerNames || playerNames.length === 0) {
        return `<span class="player-tag none">No players online</span>`;
      }

      return playerNames
        .map(name => `<span class="player-tag">${name}</span>`)
        .join("");
    }

    function renderServers(servers) {
      const serversEl = document.getElementById("servers");
      serversEl.innerHTML = "";

      const sortedServers = sortServers(servers);

      for (const server of sortedServers) {
        const card = document.createElement("div");
        card.className = server.players > 0 ? "card active" : "card";

        const displayName = cleanServerName(server.name);
        const statusClass = server.online ? "online" : "offline";
        const statusText = server.online ? "Online" : "Offline";

        card.innerHTML = `
          <div class="server-name">${displayName}</div>

          <div class="meta-row">
            <span class="pill ${statusClass}">${statusText}</span>
            <span class="pill">${server.players}/${server.maxPlayers} players</span>
          </div>

          <div class="players-section">
            <div class="players-label">Players</div>
            <div class="player-tags">
              ${buildPlayerTags(server.playerNames || [])}
            </div>
          </div>
        `;

        serversEl.appendChild(card);
      }
    }

    async function loadStatus() {
      try {
        const response = await fetch(API_URL);
        if (!response.ok) {
          throw new Error("Failed to fetch status");
        }

        const data = await response.json();
        renderSubtitle(data.totalOnline, data.updatedAt);
        renderServers(data.servers || []);
      } catch (error) {
        document.getElementById("subtitle").innerHTML = `
          <div class="sub-main">Could not load live server data</div>
          <div class="sub-time">Please try again shortly</div>
        `;
        console.error(error);
      }
    }

    loadStatus();
    setInterval(loadStatus, 15000);
  </script>
</body>
</html>
