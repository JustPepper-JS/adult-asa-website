<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Adult ASA Cluster</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #0b0d14;
      --panel-top: #171a20;
      --panel-bottom: #111318;
      --border: rgba(126, 201, 222, 0.08);
      --teal: #86c8da;
      --teal-soft: #d0eef5;
      --orange: #ff7a14;
      --text: #f4fbff;
      --muted: #9bc1cc;
      --green: #6effb3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(31, 143, 163, 0.08), transparent 28%),
        linear-gradient(180deg, #090b11 0%, #0b0d14 100%);
      color: white;
      text-align: center;
    }

    header {
      padding: 30px 20px;
      text-align: center;
      background: linear-gradient(90deg, #163e47, #214f59);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0;
      font-size: 3rem;
      color: #dff8ff;
      letter-spacing: 0.5px;
    }

    .sub {
      opacity: 0.95;
      margin-top: 12px;
      line-height: 1.5;
    }

    .sub-main {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e8fbff;
    }

    .sub-time {
      font-size: 0.95rem;
      opacity: 0.85;
      color: #d0eef5;
    }

    .wrap {
      max-width: 1300px;
      margin: 0 auto;
      padding: 26px 18px 40px;
    }

    .top-nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin: 0 auto 26px;
    }

    .top-nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.98rem;
      color: #f4fbff;
      background: linear-gradient(180deg, rgba(23, 26, 32, 0.96), rgba(17, 19, 24, 0.96));
      border: 1px solid rgba(126, 201, 222, 0.14);
      box-shadow:
        0 0 16px rgba(0, 0, 0, 0.18),
        inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .top-nav-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(126, 201, 222, 0.28);
      box-shadow:
        0 0 20px rgba(0, 0, 0, 0.22),
        0 0 18px rgba(126, 201, 222, 0.08);
    }

    .top-nav-btn.primary {
      background: linear-gradient(90deg, rgba(126, 201, 222, 0.24), rgba(255, 122, 20, 0.18));
      border-color: rgba(126, 201, 222, 0.24);
    }

    .top-nav-btn.discord {
      background: linear-gradient(90deg, rgba(88, 101, 242, 0.22), rgba(126, 201, 222, 0.14));
      border-color: rgba(88, 101, 242, 0.28);
    }

    .section {
      padding: 12px 0 28px;
    }

    .section h2 {
      color: var(--teal);
      margin-bottom: 22px;
      font-size: 2rem;
    }

    .servers {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      max-width: 1150px;
      margin: 25px auto;
    }

    .card {
      background: linear-gradient(180deg, var(--panel-top), var(--panel-bottom));
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.04);
      text-align: left;
      border: 1px solid var(--border);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 18px rgba(31, 143, 163, 0.14);
    }

    .card.active {
      border-color: rgba(255, 122, 20, 0.45);
      box-shadow: 0 0 20px rgba(255, 122, 20, 0.18);
    }

    .server-name {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: #f6fbff;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 0.92rem;
      background: rgba(255, 255, 255, 0.06);
      color: #e9e9e9;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .pill.online {
      background: rgba(0, 255, 140, 0.08);
      color: var(--green);
      border: 1px solid rgba(0, 255, 140, 0.35);
      font-weight: 700;
      box-shadow: 0 0 8px rgba(0, 255, 140, 0.25);
    }

    .pill.offline {
      background: rgba(255, 92, 92, 0.12);
      color: #ff7d7d;
      border-color: rgba(255, 92, 92, 0.2);
      font-weight: 700;
    }

    .players-section {
      margin-top: 12px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .players-label {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 10px;
      opacity: 0.95;
      color: #ffb070;
    }

    .player-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .player-tag {
      display: inline-block;
      background: rgba(0, 255, 140, 0.08);
      border: 1px solid rgba(0, 255, 140, 0.35);
      color: var(--green);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.88rem;
      line-height: 1.2;
      word-break: break-word;
    }

    .player-tag.none {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.75);
    }

    .why-play {
      max-width: 900px;
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(23, 26, 32, 0.96), rgba(17, 19, 24, 0.96));
      border: 1px solid rgba(126, 201, 222, 0.08);
      border-radius: 18px;
      padding: 24px 20px;
      text-align: center;
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.18);
      line-height: 1.8;
      color: #d8f6ff;
    }

    footer {
      margin-top: 10px;
      padding: 20px;
      font-size: 0.8rem;
      opacity: 0.7;
      color: #a3c9d3;
    }

    @media (max-width: 700px) {
      h1 { font-size: 2.4rem; }
      .top-nav { gap: 10px; }
      .top-nav-btn {
        min-width: 145px;
        padding: 11px 15px;
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Adult ASA Cluster</h1>
    <div class="sub" id="subtitle">
      <div class="sub-main">Loading live server data...</div>
      <div class="sub-time">Please wait a moment</div>
    </div>
  </header>

  <div class="wrap">
    <div class="top-nav" data-shared-nav data-page="index"></div>

    <div class="section">
      <h2>🌍 Live Server Status</h2>
      <div id="servers" class="servers"></div>
    </div>

    <div class="section">
      <h2>🔥 Why Play Here?</h2>
      <div class="why-play">
        • Active community<br />
        • Balanced rates<br />
        • No wipes ever<br />
        • Cross-map transfers<br />
        • Admin support
      </div>
    </div>
  </div>

  <footer>© 2026 Adult ASA Cluster</footer>

  <script>
    const API_URL = "https://aasa-discord-bot-v-20-production.up.railway.app/api/status";

    const SERVER_ORDER = [
      "Island",
      "Scorched Earth",
      "Aberration",
      "Extinction",
      "Ragnarok",
      "Valguero",
      "Astraeos",
      "Lost Colony"
    ];

    function cleanServerName(name) {
      let cleaned = String(name || "").replace(/^Adult ASA\s*-\s*/i, "").trim();
      if (cleaned === "SE") return "Scorched Earth";
      if (cleaned === "The Island") return "Island";
      return cleaned;
    }

    function sortServers(servers) {
      return [...servers].sort((a, b) => {
        const aName = cleanServerName(a.name);
        const bName = cleanServerName(b.name);
        const aIndex = SERVER_ORDER.indexOf(aName);
        const bIndex = SERVER_ORDER.indexOf(bName);
        if (aIndex === -1 && bIndex === -1) return aName.localeCompare(bName);
        if (aIndex === -1) return 1;
        if (bIndex === -1) return -1;
        return aIndex - bIndex;
      });
    }

    function renderSubtitle(totalOnline, updatedAt) {
      const subtitle = document.getElementById("subtitle");
      const updated = updatedAt ? new Date(updatedAt).toLocaleString() : "Unknown";
      subtitle.innerHTML = `
        <div class="sub-main">${totalOnline} Survivors Online</div>
        <div class="sub-time">Last updated: ${updated}</div>
      `;
    }

    function buildPlayerTags(playerNames) {
      if (!playerNames || playerNames.length === 0) {
        return `<span class="player-tag none">No players online</span>`;
      }
      return playerNames.map(name => `<span class="player-tag">${name}</span>`).join("");
    }

    function renderServers(servers) {
      const serversEl = document.getElementById("servers");
      serversEl.innerHTML = "";
      const sortedServers = sortServers(servers);

      for (const server of sortedServers) {
        const card = document.createElement("div");
        card.className = server.players > 0 ? "card active" : "card";
        const displayName = cleanServerName(server.name);
        const statusClass = server.online ? "online" : "offline";
        const statusText = server.online ? "Online" : "Offline";

        card.innerHTML = `
          <div class="server-name">${displayName}</div>
          <div class="meta-row">
            <span class="pill ${statusClass}">${statusText}</span>
            <span class="pill">${server.players}/${server.maxPlayers} players</span>
          </div>
          <div class="players-section">
            <div class="players-label">Players</div>
            <div class="player-tags">
              ${buildPlayerTags(server.playerNames || [])}
            </div>
          </div>
        `;

        serversEl.appendChild(card);
      }
    }

    async function loadStatus() {
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error("Failed to fetch status");
        const data = await response.json();
        renderSubtitle(data.totalOnline, data.updatedAt);
        renderServers(data.servers || []);
      } catch (error) {
        document.getElementById("subtitle").innerHTML = `
          <div class="sub-main">Could not load live server data</div>
          <div class="sub-time">Please try again shortly</div>
        `;
        console.error(error);
      }
    }

    loadStatus();
    setInterval(loadStatus, 15000);
  </script>
  <script src="./shared-nav.js"></script>
</body>
</html>
