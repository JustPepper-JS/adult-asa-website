<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Adult ASA Admin Panel</title><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="robots" content="noindex,nofollow"/><style>
:root{--bg:#0b0d14;--panel-top:#171a20;--panel-bottom:#111318;--border:rgba(126,201,222,.12);--teal:#86c8da;--orange:#ff7a14;--green:#6effb3;--red:#ff7777;--muted:#9bc1cc}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,rgba(31,143,163,.08),transparent 28%),linear-gradient(180deg,#090b11 0%,#0b0d14 100%);color:white}header{padding:30px 20px;text-align:center;background:linear-gradient(90deg,#163e47,#214f59);box-shadow:0 8px 30px rgba(0,0,0,.35)}h1{margin:0;font-size:3rem;color:#dff8ff}.wrap{max-width:1400px;margin:0 auto;padding:26px 18px 50px}.top-nav{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;margin:0 auto 26px}.top-nav-btn{display:inline-flex;align-items:center;justify-content:center;min-width:170px;padding:12px 18px;border-radius:999px;text-decoration:none;font-weight:700;color:#f4fbff;background:linear-gradient(180deg,rgba(23,26,32,.96),rgba(17,19,24,.96));border:1px solid rgba(126,201,222,.14)}.top-nav-btn.primary{background:linear-gradient(90deg,rgba(126,201,222,.24),rgba(255,122,20,.18))}.top-nav-btn.discord{background:linear-gradient(90deg,rgba(88,101,242,.22),rgba(126,201,222,.14))}.panel,.profile{background:linear-gradient(180deg,var(--panel-top),var(--panel-bottom));border:1px solid var(--border);border-radius:22px;padding:22px;box-shadow:0 0 18px rgba(0,0,0,.18);margin-bottom:16px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.input,select{width:100%;padding:13px 15px;border-radius:14px;border:1px solid rgba(126,201,222,.16);background:rgba(255,255,255,.04);color:white;font-size:1rem}.btn{cursor:pointer;border-radius:999px;padding:11px 16px;font-weight:900;border:1px solid rgba(126,201,222,.24);background:linear-gradient(90deg,rgba(126,201,222,.22),rgba(255,122,20,.14));color:white;text-decoration:none}.btn.red{border-color:rgba(255,90,90,.4);background:rgba(255,70,70,.16);color:#ffd6d6}.btn.green{border-color:rgba(0,255,140,.35);background:rgba(0,255,140,.10);color:var(--green)}.hidden{display:none}.pill-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.pill{border-radius:999px;padding:7px 10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-weight:800}.pill.live{color:var(--green);background:rgba(0,255,140,.08);border-color:rgba(0,255,140,.35)}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.status{font-weight:900;color:#dff8ff;margin-top:12px}.small{color:var(--muted);line-height:1.5;font-size:.92rem}.profile h3{margin:0;font-size:1.35rem;color:#f7fbff}@media(max-width:700px){h1{font-size:2.35rem}.top-nav-btn{min-width:145px}}
</style><style id="adultasa-secondary-page-no-huge-logo">
  body:not(.adultasa-command-center) img,
  body:not(.adultasa-command-center) picture,
  body:not(.adultasa-command-center) .top-command,
  body:not(.adultasa-command-center) .brand-mark,
  body:not(.adultasa-command-center) .brand-orb,
  body:not(.adultasa-command-center) .brand-orb-img,
  body:not(.adultasa-command-center) .site-logo,
  body:not(.adultasa-command-center) .logo,
  body:not(.adultasa-command-center) .logo-wrap,
  body:not(.adultasa-command-center) .hero-logo,
  body:not(.adultasa-command-center) .page-logo,
  body:not(.adultasa-command-center) .cluster-logo {
    display: none !important;
    width: 0 !important;
    height: 0 !important;
    max-width: 0 !important;
    max-height: 0 !important;
    min-width: 0 !important;
    min-height: 0 !important;
    margin: 0 !important;
    padding: 0 !important;
    overflow: hidden !important;
    opacity: 0 !important;
    pointer-events: none !important;
  }
</style>
<style id="adultasa-final-command-center-nav-css">
  [data-shared-nav] > a:not(.top-nav-btn),
  [data-shared-nav] .shared-nav-brand,
  [data-shared-nav] .brand-mark,
  [data-shared-nav] .brand-orb,
  [data-shared-nav] .brand-orb-img {
    display: none !important;
  }

  .top-nav-btn.command-center-link,
  .top-links a.command-center-link {
    min-width: 190px !important;
    background: linear-gradient(90deg, rgba(88,101,242,.32), rgba(126,201,222,.18)) !important;
    border-color: rgba(126,201,222,.42) !important;
    color: #f4fbff !important;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.03), 0 12px 24px rgba(0,0,0,.18), 0 0 20px rgba(88,101,242,.20) !important;
  }
</style>
</head><body><header><h1>Adult ASA Cluster</h1></header><div class="wrap"><div class="top-nav hidden" id="adminNav" data-shared-nav data-page="admin"></div>
<section class="panel" id="loginPanel"><h2>Admin Login</h2><div class="grid"><input class="input" id="password" type="password" placeholder="Website admin password"/><button class="btn" id="loginBtn">Unlock Admin Panel</button></div><div class="status" id="loginStatus"></div></section>
<section class="panel hidden" id="adminPanel"><h2>Profile Tools</h2><div class="grid"><div><input class="input" id="createName" placeholder="Create/find profile name"/><button class="btn" id="createBtn">Create Profile</button></div><div><input class="input" id="primaryName" placeholder="Primary profile/player name"/><input class="input" id="linkNames" placeholder="Other account names, comma separated" style="margin-top:8px"/><button class="btn" id="linkBtn">Link / Merge Accounts</button></div><div><input class="input" id="modName" placeholder="Player name to make mod"/><select id="modRole" style="margin-top:8px"><option value="Mod">Mod</option><option value="Admin">Admin</option><option value="Owner">Owner</option><option value="VIP">VIP</option></select><button class="btn green" id="modBtn">Add Mod</button></div></div><div class="status" id="statusText"></div></section>
<section class="panel hidden" id="profilesPanel"><h2>All User Profiles</h2><input class="input" id="filter" placeholder="Filter profiles"/><div id="profiles" style="margin-top:16px"></div></section></div>
<script>
const API_BASE="https://aasa-discord-bot-v-20-production.up.railway.app";let adminPassword="";let profiles=[];
function esc(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#039;")}
function setStatus(t){document.getElementById("statusText").textContent=t;document.getElementById("loginStatus").textContent=t}
async function api(path,opts={}){const init={...opts,headers:{"Content-Type":"application/json",...(opts.headers||{})}};const res=await fetch(`${API_BASE}${path}`,init);const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.error||"Request failed");return data}
async function loadProfiles(){const data=await api(`/api/player-profiles/admin?password=${encodeURIComponent(adminPassword)}`);profiles=data.profiles||[];document.getElementById("loginPanel").classList.add("hidden");document.getElementById("adminNav").classList.remove("hidden");document.getElementById("adminPanel").classList.remove("hidden");document.getElementById("profilesPanel").classList.remove("hidden");renderProfiles();setStatus(`Loaded ${profiles.length} profiles.`)}
function renderProfiles(){const q=document.getElementById("filter").value.trim().toLowerCase();const list=profiles.filter(p=>!q||[p.player,p.role,...(p.aka||[]),...(p.linkedNames||[])].join(" ").toLowerCase().includes(q));document.getElementById("profiles").innerHTML=list.map(p=>`
<div class="profile">
  <h3>${esc(p.player)}</h3>

  <div class="pill-row"><span class="pill">${Number(p.totalHours||0).toFixed(2)}h</span><span class="pill">${p.timesJoined||0} joins</span>${p.currentServer?`<span class="pill live">On ${esc(p.currentServer)}</span>`:""}${p.isMod?`<span class="pill">${esc(p.role||"Mod")}</span>`:""}</div><div class="actions"><a class="btn" href="./profile.html?name=${encodeURIComponent(p.player)}">View Profile</a><button class="btn green" onclick="quickMod('${esc(p.player)}')">Add Mod</button><button class="btn" onclick="prefillLink('${esc(p.player)}')">Link Accounts</button><button class="btn red" onclick="deleteProfile('${esc(p.id)}','${esc(p.player)}')">Delete</button></div></div>`).join("")||'<div class="small">No profiles found.</div>'}
async function createProfile(){const name=document.getElementById("createName").value.trim();if(!name)return;await api('/api/player-profiles/admin/create',{method:'POST',body:JSON.stringify({password:adminPassword,name})});await loadProfiles()}
async function linkProfiles(){const primaryName=document.getElementById("primaryName").value.trim();const names=document.getElementById("linkNames").value.split(',').map(x=>x.trim()).filter(Boolean);if(!primaryName||!names.length)return;await api('/api/player-profiles/admin/link',{method:'POST',body:JSON.stringify({password:adminPassword,primaryName,names})});await loadProfiles()}
async function addMod(name,role){await api('/api/player-profiles/admin/mod',{method:'POST',body:JSON.stringify({password:adminPassword,name,role:role||"Mod"})});await loadProfiles()}
function prefillLink(name){document.getElementById("primaryName").value=name;document.getElementById("linkNames").focus()}function quickMod(name){document.getElementById("modName").value=name;addMod(name,document.getElementById("modRole").value.trim()||"Mod").catch(e=>setStatus(e.message))}
async function deleteProfile(id,name){const pin=prompt(`Enter delete PIN to delete ${name}:`);if(pin===null)return;await api('/api/player-profiles/admin/delete',{method:'POST',body:JSON.stringify({password:adminPassword,pin,id})});await loadProfiles()}
document.getElementById("loginBtn").onclick=()=>{adminPassword=document.getElementById("password").value;loadProfiles().catch(e=>setStatus(e.message))};document.getElementById("createBtn").onclick=()=>createProfile().catch(e=>setStatus(e.message));document.getElementById("linkBtn").onclick=()=>linkProfiles().catch(e=>setStatus(e.message));document.getElementById("modBtn").onclick=()=>addMod(document.getElementById("modName").value.trim(),document.getElementById("modRole").value.trim()).catch(e=>setStatus(e.message));document.getElementById("filter").oninput=renderProfiles;

document.getElementById("siteIconInput")?.addEventListener("change",async(event)=>{
  try{
    pendingSiteIconData=await validateAndReadIcon(event.target.files[0]);
    const preview=document.getElementById("siteIconPreview");
    if(preview)preview.src=pendingSiteIconData;
    setIconStatus("Preview ready. Click Save Site Icon to apply it.");
  }catch(error){
    pendingSiteIconData=null;
    event.target.value="";
    setIconStatus(error.message);
  }
});

document.getElementById("saveSiteIconBtn")?.addEventListener("click",()=>{
  try{
    if(!pendingSiteIconData)throw new Error("Choose an image first.");
    localStorage.setItem(SITE_ICON_KEY,pendingSiteIconData);
    renderSiteIconManager();
    setIconStatus("Saved. The top-left icon and browser tab icon will update on this browser.");
  }catch(error){
    setIconStatus(error.message);
  }
});

document.getElementById("resetSiteIconBtn")?.addEventListener("click",()=>{
  try{
    localStorage.removeItem(SITE_ICON_KEY);
    pendingSiteIconData=null;
    const input=document.getElementById("siteIconInput");
    if(input)input.value="";
    renderSiteIconManager();
    setIconStatus("Reset to the built-in fallback icon.");
  }catch(error){
    setIconStatus(error.message);
  }
});

</script><script src="./shared-nav.js?v=command-center-final-2"></script></body></html>
