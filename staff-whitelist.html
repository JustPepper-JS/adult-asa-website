<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Adult ASA Staff Whitelist</title><meta name="viewport" content="width=device-width, initial-scale=1.0"/><style>
:root{--bg:#0b0d14;--panel-top:#171a20;--panel-bottom:#111318;--border:rgba(126,201,222,.08);--teal:#86c8da;--teal-soft:#d0eef5;--orange:#ff7a14;--text:#f4fbff;--muted:#9bc1cc;--purple:#d99cff}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,rgba(31,143,163,.08),transparent 28%),linear-gradient(180deg,#090b11 0%,#0b0d14 100%);color:white}header{padding:30px 20px;text-align:center;background:linear-gradient(90deg,#163e47,#214f59);box-shadow:0 8px 30px rgba(0,0,0,.35)}h1{margin:0;font-size:3rem;color:#dff8ff;letter-spacing:.5px}.sub{opacity:.95;margin-top:12px;line-height:1.5;color:#d0eef5}.wrap{max-width:1300px;margin:0 auto;padding:26px 18px 40px}.top-nav{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;margin:0 auto 26px}.top-nav-btn{display:inline-flex;align-items:center;justify-content:center;min-width:170px;padding:12px 18px;border-radius:999px;text-decoration:none;font-weight:700;font-size:.98rem;color:#f4fbff;background:linear-gradient(180deg,rgba(23,26,32,.96),rgba(17,19,24,.96));border:1px solid rgba(126,201,222,.14);box-shadow:0 0 16px rgba(0,0,0,.18),inset 0 0 0 1px rgba(255,255,255,.02);transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}.top-nav-btn:hover{transform:translateY(-1px);border-color:rgba(126,201,222,.28);box-shadow:0 0 20px rgba(0,0,0,.22),0 0 18px rgba(126,201,222,.08)}.top-nav-btn.primary{background:linear-gradient(90deg,rgba(126,201,222,.24),rgba(255,122,20,.18));border-color:rgba(126,201,222,.24)}.top-nav-btn.discord{background:linear-gradient(90deg,rgba(88,101,242,.22),rgba(126,201,222,.14));border-color:rgba(88,101,242,.28)}.panel{background:linear-gradient(180deg,var(--panel-top),var(--panel-bottom));border:1px solid var(--border);border-radius:22px;padding:28px;box-shadow:0 0 18px rgba(0,0,0,.18)}.panel h2{margin:0 0 12px;color:var(--teal);font-size:2rem}.panel p{color:#d8f6ff;line-height:1.7;margin:0 0 18px}.form-grid{display:grid;gap:14px}.input,.textarea{width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(126,201,222,.16);background:linear-gradient(180deg,rgba(23,26,32,.96),rgba(17,19,24,.96));color:white;font-size:1rem;outline:none}.textarea{min-height:260px;resize:vertical;line-height:1.55;font-family:Consolas,monospace}.button-row{display:flex;gap:10px;flex-wrap:wrap}.btn{cursor:pointer;border-radius:999px;padding:11px 16px;font-weight:800;border:1px solid rgba(126,201,222,.18);background:linear-gradient(90deg,rgba(126,201,222,.22),rgba(255,122,20,.14));color:white}.btn.purple{background:linear-gradient(90deg,rgba(217,156,255,.24),rgba(126,201,222,.14));border-color:rgba(217,156,255,.34)}.note{margin-top:14px;color:#9bc1cc;line-height:1.5}.status{margin-top:14px;color:#dff8ff;font-weight:800}.staff-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.staff-chip{padding:8px 12px;border-radius:999px;background:rgba(217,156,255,.11);border:1px solid rgba(217,156,255,.52);color:#f1d8ff;box-shadow:0 0 14px rgba(188,111,255,.22);font-weight:800}@media(max-width:700px){h1{font-size:2.35rem}.top-nav-btn{min-width:145px;padding:11px 15px;font-size:.92rem}}
</style></head><body><header><h1>Adult ASA Cluster</h1><div class="sub">Owner/admin staff whitelist manager.</div></header><div class="wrap"><div class="top-nav" data-shared-nav data-page="stafflist"></div><section class="panel"><h2>Staff Whitelist</h2><p>Add staff by survivor name and/or in-game ID. Anyone listed here will glow purple on Cluster Status when online.</p><div class="form-grid"><input class="input" id="adminKey" type="password" placeholder="Admin web key from Railway"/><textarea class="textarea" id="staffText" spellcheck="false" placeholder="One staff member per line:\nPepper | 00029a9b42fc4f2d902869f97320ecb5 | Owner\nRa3nb0w | optional-id | Admin"></textarea><div class="button-row"><button class="btn" id="loadBtn">Load current list</button><button class="btn purple" id="saveBtn">Save staff whitelist</button></div></div><div class="note">Format: <strong>Survivor Name | In-game ID | Role</strong>. You can leave the ID blank if you only want name matching.</div><div class="status" id="statusText"></div><div class="staff-preview" id="preview"></div></section></div><script src="./shared-nav.js"></script><script>
const API_BASE="https://aasa-discord-bot-v-20-production.up.railway.app";
const keyInput=document.getElementById("adminKey");const staffText=document.getElementById("staffText");const statusText=document.getElementById("statusText");const preview=document.getElementById("preview");
keyInput.value=localStorage.getItem("adultasa_admin_key")||"";
function parseLines(){return staffText.value.split("\n").map(l=>l.trim()).filter(Boolean).map(line=>{const [name="",id="",role="Staff"]=line.split("|").map(x=>x.trim());return{name,id,role:role||"Staff"};}).filter(x=>x.name||x.id)}
function renderPreview(staff){preview.innerHTML=(staff||[]).map(x=>`<span class="staff-chip">✦ ${escapeHtml(x.name||x.id)}${x.role?` · ${escapeHtml(x.role)}`:""}</span>`).join("")||""}
function escapeHtml(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#039;")}
async function loadStaff(){statusText.textContent="Loading staff whitelist...";const res=await fetch(`${API_BASE}/api/staff`);if(!res.ok)throw new Error("Could not load staff list");const data=await res.json();staffText.value=(data.staff||[]).map(x=>`${x.name||""} | ${x.id||""} | ${x.role||"Staff"}`).join("\n");renderPreview(data.staff||[]);statusText.textContent="Loaded."}
async function saveStaff(){const key=keyInput.value.trim();localStorage.setItem("adultasa_admin_key",key);const staff=parseLines();statusText.textContent="Saving staff whitelist...";const res=await fetch(`${API_BASE}/api/staff`,{method:"POST",headers:{"Content-Type":"application/json","x-admin-key":key},body:JSON.stringify({staff})});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.error||"Could not save staff list");renderPreview(data.staff||staff);statusText.textContent="Saved. Cluster Status will update on the next refresh."}
document.getElementById("loadBtn").addEventListener("click",()=>loadStaff().catch(e=>statusText.textContent=e.message));document.getElementById("saveBtn").addEventListener("click",()=>saveStaff().catch(e=>statusText.textContent=e.message));staffText.addEventListener("input",()=>renderPreview(parseLines()));loadStaff().catch(()=>{});
</script></body></html>
