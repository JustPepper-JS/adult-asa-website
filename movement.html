<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Adult ASA Player Movement History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #0b0d14;
      --panel-top: #171a20;
      --panel-bottom: #111318;
      --border: rgba(126, 201, 222, 0.08);
      --teal: #86c8da;
      --teal-soft: #d0eef5;
      --orange: #ff7a14;
      --text: #f4fbff;
      --muted: #9bc1cc;
      --green: #6effb3;
      --pill: rgba(255,255,255,0.06);
      --staff-blue: #54cfff;
      --owner-gold: #ffd36a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(31, 143, 163, 0.08), transparent 28%),
        linear-gradient(180deg, #090b11 0%, #0b0d14 100%);
      color: white;
    }

    header {
      padding: 30px 20px;
      text-align: center;
      background: linear-gradient(90deg, #163e47, #214f59);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0;
      font-size: 3rem;
      color: #dff8ff;
      letter-spacing: 0.5px;
    }

    .sub {
      opacity: 0.95;
      margin-top: 12px;
      line-height: 1.5;
      color: #d0eef5;
    }

    .wrap {
      max-width: 1450px;
      margin: 0 auto;
      padding: 26px 18px 50px;
    }

    .top-nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin: 0 auto 20px;
    }

    .top-nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.98rem;
      color: #f4fbff;
      background: linear-gradient(180deg, rgba(23, 26, 32, 0.96), rgba(17, 19, 24, 0.96));
      border: 1px solid rgba(126, 201, 222, 0.14);
      box-shadow: 0 0 16px rgba(0, 0, 0, 0.18), inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .top-nav-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(126, 201, 222, 0.28);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.22), 0 0 18px rgba(126, 201, 222, 0.08);
    }

    .top-nav-btn.primary {
      background: linear-gradient(90deg, rgba(126, 201, 222, 0.24), rgba(255, 122, 20, 0.18));
      border-color: rgba(126, 201, 222, 0.24);
    }

    .top-nav-btn.discord {
      background: linear-gradient(90deg, rgba(88, 101, 242, 0.22), rgba(126, 201, 222, 0.14));
      border-color: rgba(88, 101, 242, 0.28);
    }

    .controls, .totals {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 18px;
    }

    .range-btn, .stat-pill, .chip, .toggle-btn {
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      font-size: 0.95rem;
      border: 1px solid rgba(126, 201, 222, 0.16);
      background: linear-gradient(180deg, rgba(23, 26, 32, 0.96), rgba(17, 19, 24, 0.96));
      color: #f4fbff;
    }

    .range-btn, .toggle-btn {
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .range-btn:hover, .toggle-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(126, 201, 222, 0.28);
    }

    .range-btn.active {
      background: linear-gradient(90deg, #ff7a14, #ff9a4d);
      border-color: transparent;
      box-shadow: 0 0 14px rgba(255, 122, 20, 0.24);
    }

    .search-wrap {
      max-width: 760px;
      margin: 0 auto 20px;
    }

    .search-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(126, 201, 222, 0.16);
      background: linear-gradient(180deg, rgba(23, 26, 32, 0.96), rgba(17, 19, 24, 0.96));
      color: white;
      font-size: 1rem;
      outline: none;
    }



    .filter-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin: 0 auto 18px;
      color: #dff8ff;
      font-weight: 800;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 54px;
      height: 30px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      transition: 0.2s;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.25);
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    .switch input:checked + .slider {
      background: rgba(110, 255, 179, 0.70);
      border-color: rgba(110, 255, 179, 0.95);
      box-shadow: 0 0 14px rgba(110, 255, 179, 0.24);
    }

    .switch input:checked + .slider:before {
      transform: translateX(24px);
    }

    .panel {
      background: linear-gradient(180deg, var(--panel-top), var(--panel-bottom));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.18);
    }

    .panel h2 {
      margin: 0 0 10px;
      color: var(--teal);
      font-size: 2rem;
    }

    .panel-note {
      color: #cbe7ef;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .cards {
      display: grid;
      gap: 18px;
    }

    .player-card {
      position: relative;
      border: 1px solid rgba(126, 201, 222, 0.18);
      border-radius: 22px;
      padding: 20px;
      background:
        radial-gradient(circle at top left, rgba(126, 201, 222, 0.06), transparent 26%),
        linear-gradient(90deg, rgba(18, 29, 48, 0.98), rgba(34, 24, 20, 0.98));
      box-shadow: 0 0 22px rgba(0, 0, 0, 0.18);
    }

    .player-banner {
      padding: 22px 24px;
      border-radius: 20px;
      background: linear-gradient(90deg, rgba(126, 201, 222, 0.28), rgba(255, 122, 20, 0.22));
      border: 1px solid rgba(126, 201, 222, 0.22);
      color: #f7fbff;
      font-size: 1.55rem;
      font-weight: 800;
      margin-bottom: 18px;
      box-shadow: inset 0 0 24px rgba(255,255,255,0.02);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .chip.live {
      color: var(--green);
      border-color: rgba(0, 255, 140, 0.35);
      background: rgba(0, 255, 140, 0.08);
      box-shadow: 0 0 14px rgba(0, 255, 140, 0.18);
    }

    .chip.mod-add {
      cursor: pointer;
      color: #d8f6ff;
      border-color: rgba(84, 207, 255, 0.42);
      background: rgba(84, 207, 255, 0.10);
      box-shadow: 0 0 14px rgba(84, 207, 255, 0.16);
    }

    .chip.mod-add:hover {
      transform: translateY(-1px);
      border-color: rgba(84, 207, 255, 0.68);
      box-shadow: 0 0 18px rgba(84, 207, 255, 0.24);
    }

    .card-mod-button {
      margin-left: auto;
      min-width: 170px;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 900;
      font-size: 0.95rem;
      cursor: pointer;
      color: #d8f6ff;
      border: 1px solid rgba(84, 207, 255, 0.48);
      background: linear-gradient(90deg, rgba(84, 207, 255, 0.16), rgba(126, 201, 222, 0.08));
      box-shadow: 0 0 18px rgba(84, 207, 255, 0.18);
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .card-mod-button:hover {
      transform: translateY(-1px);
      border-color: rgba(84, 207, 255, 0.75);
      box-shadow: 0 0 24px rgba(84, 207, 255, 0.28);
    }

    .card-mod-button.saved {
      color: #ffe8a8;
      border-color: rgba(255, 211, 106, 0.68);
      background: rgba(255, 211, 106, 0.14);
      box-shadow: 0 0 18px rgba(255, 211, 106, 0.22);
    }

    .chip.sessions-chip {
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .chip.sessions-chip:hover {
      transform: translateY(-1px);
      border-color: rgba(126, 201, 222, 0.34);
      box-shadow: 0 0 14px rgba(126, 201, 222, 0.14);
    }

    .chip.sessions-chip.open {
      color: #dff6ff;
      border-color: rgba(126, 201, 222, 0.42);
      background: rgba(126, 201, 222, 0.14);
      box-shadow: 0 0 18px rgba(126, 201, 222, 0.18);
    }

    .sessions-title {
      font-size: 1.05rem;
      font-weight: 800;
      margin-bottom: 10px;
      color: #f0f7fb;
    }

    .sessions-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .show-more-btn {
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      font-size: 0.95rem;
      border: 1px solid rgba(126, 201, 222, 0.16);
      background: linear-gradient(180deg, rgba(23, 26, 32, 0.96), rgba(17, 19, 24, 0.96));
      color: #f4fbff;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .show-more-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(126, 201, 222, 0.28);
      box-shadow: 0 0 16px rgba(126, 201, 222, 0.1);
    }

    .show-more-btn.open {
      color: #dff6ff;
      border-color: rgba(126, 201, 222, 0.42);
      background: rgba(126, 201, 222, 0.14);
      box-shadow: 0 0 18px rgba(126, 201, 222, 0.18);
    }

    .session-list {
      display: grid;
      gap: 12px;
    }

    .session-card {
      border-radius: 18px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
    }

    .session-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .session-main {
      font-size: 1.05rem;
      font-weight: 800;
      color: #ffeede;
    }

    .session-sub {
      margin-top: 8px;
      color: #9fc9d7;
      line-height: 1.45;
      font-size: 0.97rem;
    }

    .session-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toggle-btn {
      min-width: 132px;
    }

    .toggle-btn.open {
      background: linear-gradient(90deg, rgba(126, 201, 222, 0.22), rgba(255, 122, 20, 0.18));
      border-color: rgba(126, 201, 222, 0.24);
    }

    .details {
      display: none;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .details.open {
      display: block;
    }

    .maps-flow {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .map-pill {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 700;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #eff9ff;
    }

    .arrow {
      color: #ffb277;
      font-weight: 800;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 10px;
    }

    .detail-card {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      line-height: 1.45;
      color: #d7edf5;
    }

    .hidden {
      display: none !important;
    }

    .empty-state {
      text-align: center;
      padding: 28px 12px;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      h1 { font-size: 2.3rem; }
      .top-nav-btn { min-width: 145px; padding: 11px 15px; font-size: 0.92rem; }
      .player-banner { font-size: 1.2rem; padding: 18px; }
      .session-top { flex-direction: column; }
      .session-actions { width: 100%; }
      .card-mod-button {
        width: 100%;
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Adult ASA Cluster</h1>
    <div class="sub" id="subtitle">Loading player movement history...</div>
  </header>

  <div class="wrap">
    <div class="top-nav" data-shared-nav data-page="movement"></div>

    <div class="controls" id="controls">
      <button class="range-btn" data-range="24h">Day</button>
      <button class="range-btn active" data-range="72h">3 Days</button>
      <button class="range-btn" data-range="7d">Week</button>
      <button class="range-btn" data-range="30d">Month</button>
      <button class="range-btn" data-range="365d">Year</button>
    </div>

    <div class="search-wrap">
      <input id="playerSearch" class="search-input" type="search" placeholder="Search a survivor or leave blank for everyone" />
    </div>

    <div class="filter-row">
      <span>Show online only</span>
      <label class="switch">
        <input id="onlineOnlyToggle" type="checkbox" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="totals" id="totals"></div>

    <div class="panel">
      <h2>Player Movement History</h2>
      <div class="panel-note">Each player shows join time, map path, session length, and transfer history inside the selected time range. Auto-refresh runs every 15 seconds.</div>
      <div id="cards" class="cards"></div>
    </div>
  </div>

  <script>
    const API_BASE = "https://aasa-discord-bot-v-20-production.up.railway.app";
    const WEBSITE_MASTER_PASSWORD = "Az1999!!";
    const LOCAL_STAFF_KEY = "adultasa_staff_whitelist";
    let currentRange = "72h";
    let currentSearch = "";
    let searchTimer = null;
    let showOnlineOnly = false;

    function fmtDate(ms) {
      return new Date(ms).toLocaleString();
    }

    function fmtSessionHeader(ms) {
      return new Date(ms).toLocaleString([], {
        month: "numeric",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function fmtHours(value) {
      return `${Number(value || 0).toFixed(2)}h total`;
    }

    function fmtDurationMs(ms) {
      const totalMinutes = Math.max(0, Math.round(Number(ms || 0) / 60000));
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      return `${hours}h ${minutes}m`;
    }

    function buildSessionSubtitle(session) {
      if (session.isActive) {
        return `Started ${fmtDate(session.sessionStart)} and is still active`;
      }
      return `Started ${fmtDate(session.sessionStart)} and ended ${fmtDate(session.sessionEnd)}`;
    }


    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function loadLocalStaff() {
      try {
        const saved = JSON.parse(localStorage.getItem(LOCAL_STAFF_KEY) || "[]");
        const staff = Array.isArray(saved) ? saved : [];
        if (!staff.some((member) => String(member.name || "").trim().toLowerCase() === "pepper")) {
          staff.unshift({ name: "Pepper", id: "", role: "Owner" });
        }
        return staff.map((member) => String(member.name || "").trim().toLowerCase() === "pepper" ? { ...member, name: "Pepper", role: "Owner" } : member);
      } catch (error) {
        return [{ name: "Pepper", id: "", role: "Owner" }];
      }
    }

    function saveLocalStaff(staff) {
      const cleanStaff = (staff || []).filter((member) => member && (member.name || member.id));
      if (!cleanStaff.some((member) => String(member.name || "").trim().toLowerCase() === "pepper")) {
        cleanStaff.unshift({ name: "Pepper", id: "", role: "Owner" });
      }
      cleanStaff.forEach((member) => {
        if (String(member.name || "").trim().toLowerCase() === "pepper") member.role = "Owner";
      });
      localStorage.setItem(LOCAL_STAFF_KEY, JSON.stringify(cleanStaff));
      return cleanStaff;
    }

    function isLocalMod(playerName) {
      const lowerName = String(playerName || "").trim().toLowerCase();
      return loadLocalStaff().some((member) => String(member.name || "").trim().toLowerCase() === lowerName);
    }

    function renderTotals(data) {
      document.getElementById("totals").innerHTML = `
        <div class="stat-pill">${data.totals.players} survivors</div>
        <div class="stat-pill">${data.totals.sessions} sessions</div>
        <div class="stat-pill">${data.totals.transfers} transfers</div>
        <div class="stat-pill">1 hour blocks on heat map page</div>
      `;
    }

    function renderCards(players) {
      const el = document.getElementById("cards");

      const sortedPlayers = [...(players || [])].sort((a, b) => {
        const aOnline = Boolean(a.isOnline);
        const bOnline = Boolean(b.isOnline);

        if (aOnline !== bOnline) {
          return bOnline - aOnline;
        }

        const aHours = Number(a.totalHours || 0);
        const bHours = Number(b.totalHours || 0);

        if (bHours !== aHours) {
          return bHours - aHours;
        }

        return String(a.player || "").localeCompare(String(b.player || ""));
      });

      const visiblePlayers = showOnlineOnly
        ? sortedPlayers.filter((player) => player.isOnline)
        : sortedPlayers;

      if (!visiblePlayers.length) {
        el.innerHTML = `<div class="empty-state">No movement history found for that search.</div>`;
        return;
      }

      el.innerHTML = visiblePlayers.map((player, playerIndex) => {
        const banner = `${player.player} ${player.isOnline && player.currentServer ? `- Playing on ${player.currentServer}` : "- Offline"}`;
        const allSessions = player.sessions || [];
        const initialSessions = allSessions.slice(0, 1);
        const hiddenSessions = allSessions.slice(1);
        const sessionsToggleId = `sessions-toggle-${playerIndex}`;
        const hiddenWrapId = `hidden-sessions-${playerIndex}`;
        const sessionChipText = `${player.sessionCount || 0} ${Number(player.sessionCount || 0) === 1 ? "session" : "sessions"}`;
        const existing = loadLocalStaff().find(
  m => String(m.name || "").trim().toLowerCase() === String(player.player || "").trim().toLowerCase()
);

const isOwner = existing && String(existing.role || "").toLowerCase() === "owner";

const modButtonText = existing
  ? (isOwner ? "Already Mod/Owner" : "Already Mod")
  : "Add as Mod";
        const modButtonClass = existing ? "saved" : "";

        const renderSessionCard = (session, sessionIndex, hidden = false) => {
          const detailsId = `details-${playerIndex}-${sessionIndex}-${hidden ? "extra" : "main"}`;
          const mapsFlow = (session.maps || []).map((map, mapIndex) => {
            const pill = `<span class="map-pill">${map.server} · ${fmtDurationMs(map.durationMs)}</span>`;
            return mapIndex === 0 ? pill : `<span class="arrow">→</span>${pill}`;
          }).join("");

          const transferText = Number(session.transferCount || 0) === 1 ? "1 transfer" : `${Number(session.transferCount || 0)} transfers`;

          return `
            <div class="session-card">
              <div class="session-top">
                <div>
                  <div class="session-main">Session: ${fmtSessionHeader(session.sessionStart)}</div>
                  <div class="session-sub">${buildSessionSubtitle(session)}</div>
                </div>
                <div class="session-actions">
                  <span class="chip">${fmtDurationMs(session.totalDurationMs)}</span>
                  <span class="chip">${transferText}</span>
                  <button class="toggle-btn" data-target="${detailsId}">Show details</button>
                </div>
              </div>
              <div class="details" id="${detailsId}">
                <div class="maps-flow">${mapsFlow || `<span class="map-pill">No map path</span>`}</div>
                <div class="detail-grid">
                  ${(session.maps || []).map((map) => `
                    <div class="detail-card">
                      <strong>${map.server}</strong><br>
                      Joined: ${fmtDate(map.start)}<br>
                      ${map.isActive ? `Still active here` : `Left: ${fmtDate(map.end)}`}<br>
                      Stayed: ${fmtDurationMs(map.durationMs)}
                    </div>
                  `).join("")}
                </div>
              </div>
            </div>
          `;
        };

        return `
          <div class="player-card">
            <div class="player-banner">${banner}</div>

            <div class="chip-row">
              <span class="chip">${fmtHours(player.totalHours)}</span>

              <button type="button" class="chip sessions-chip" id="${sessionsToggleId}" data-target="${hiddenWrapId}" aria-expanded="false">${sessionChipText}</button>

              <span class="chip">${player.transferCount || 0} ${Number(player.transferCount || 0) === 1 ? "transfer" : "transfers"}</span>

              ${player.isOnline && player.currentServer ? `<span class="chip live">On ${player.currentServer}</span>` : `<span class="chip">Last seen ${player.lastSeenIso ? fmtDate(player.lastSeenIso) : "Unknown"}</span>`}

              <button type="button" class="card-mod-button ${modButtonClass}" data-player="${escapeHtml(player.player || '')}">${modButtonText}</button>
            </div>

            <div class="sessions-header">
              <div class="sessions-title">Sessions List</div>
              ${hiddenSessions.length ? `<button type="button" class="show-more-btn" data-target="${hiddenWrapId}">Show more sessions (${hiddenSessions.length})</button>` : ``}
            </div>

            <div class="session-list">
              ${initialSessions.length ? initialSessions.map((session, sessionIndex) => renderSessionCard(session, sessionIndex)).join("") : `<div class="empty-state">No sessions in this range.</div>`}
            </div>

            ${hiddenSessions.length ? `<div class="session-list hidden" id="${hiddenWrapId}">${hiddenSessions.map((session, sessionIndex) => renderSessionCard(session, sessionIndex + 1, true)).join("")}</div>` : ``}
          </div>
        `;
      }).join("");

      el.querySelectorAll('.card-mod-button').forEach((btn) => {
        btn.addEventListener('click', () => addPlayerAsMod(btn.dataset.player, btn));
      });

      el.querySelectorAll('.toggle-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const target = document.getElementById(btn.dataset.target);
          const isOpen = target.classList.toggle('open');
          btn.classList.toggle('open', isOpen);
          btn.textContent = isOpen ? 'Show less' : 'Show details';
        });
      });

      const syncSessionToggleState = (targetId, isOpen) => {
        el.querySelectorAll(`[data-target="${targetId}"]`).forEach((control) => {
          if (control.classList.contains('sessions-chip')) {
            control.classList.toggle('open', isOpen);
            control.setAttribute('aria-expanded', String(isOpen));
          }

          if (control.classList.contains('show-more-btn')) {
            control.classList.toggle('open', isOpen);
            control.textContent = isOpen ? 'Show fewer sessions' : `Show more sessions (${document.getElementById(targetId)?.children.length || 0})`;
          }
        });
      };

      el.querySelectorAll('.sessions-chip, .show-more-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const target = document.getElementById(btn.dataset.target);
          if (!target) return;

          const isOpen = target.classList.toggle('hidden') === false;
          syncSessionToggleState(btn.dataset.target, isOpen);
        });
      });
    }

    async function addPlayerAsMod(playerName, button) {
      const cleanName = String(playerName || "").trim();
      if (!cleanName) return;

      const password = prompt(`Enter website master password to add ${cleanName} as a Mod:`);
      if (password === null) return;
      if (password !== WEBSITE_MASTER_PASSWORD) {
        alert("Wrong website master password.");
        return;
      }

      const staff = loadLocalStaff();
      const lowerName = cleanName.toLowerCase();
      const existing = staff.find((member) => String(member.name || "").trim().toLowerCase() === lowerName);

      if (existing) {
        if (lowerName === "pepper") existing.role = "Owner";
        else existing.role = existing.role || "Mod";
      } else {
        staff.push({ name: cleanName, id: "", role: "Mod" });
      }

      saveLocalStaff(staff);
      button.textContent = lowerName === "pepper" ? "Owner saved" : "Mod saved";
      button.classList.add("saved");

      setTimeout(() => {
        button.textContent = lowerName === "pepper" ? "Already Mod/Owner" : "Already Mod";
      }, 900);
    }

    async function loadMovement() {
      const subtitle = document.getElementById("subtitle");
      subtitle.textContent = "Loading player movement history...";

      const res = await fetch(`${API_BASE}/api/heatmap?range=${encodeURIComponent(currentRange)}&player=${encodeURIComponent(currentSearch)}`);
      if (!res.ok) throw new Error("Failed to load movement history");

      const data = await res.json();
      subtitle.textContent = `Showing ${currentSearch ? `results for \"${currentSearch}\"` : "all player movement"} from ${new Date(data.startMs).toLocaleString()} to ${new Date(data.endMs).toLocaleString()}.`;
      renderTotals(data);
      renderCards(data.players || []);
    }

    document.getElementById("controls").addEventListener("click", (event) => {
      const btn = event.target.closest(".range-btn");
      if (!btn) return;
      currentRange = btn.dataset.range;
      document.querySelectorAll(".range-btn").forEach((item) => item.classList.toggle("active", item === btn));
      loadMovement().catch(handleError);
    });

    document.getElementById("playerSearch").addEventListener("input", (event) => {
      currentSearch = event.target.value.trim();
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        loadMovement().catch(handleError);
      }, 250);
    });

    document.getElementById("onlineOnlyToggle").addEventListener("change", (event) => {
      showOnlineOnly = event.target.checked;
      loadMovement().catch(handleError);
    });

    function handleError(error) {
      console.error(error);
      document.getElementById("subtitle").textContent = "Could not load player movement history.";
    }

    loadMovement().catch(handleError);
    setInterval(() => loadMovement().catch(handleError), 15000);
  </script>
  <script src="./shared-nav.js"></script>
</body>
</html>
