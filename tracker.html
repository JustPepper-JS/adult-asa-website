<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Adult ASA Cluster Activity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #0b0d14;
      --panel-top: #171a20;
      --panel-bottom: #111318;
      --border: rgba(126, 201, 222, 0.08);
      --teal: #7ec9de;
      --teal-soft: #d0eef5;
      --orange: #ff6a00;
      --orange-soft: #ffb277;
      --text: #f4fbff;
      --muted: #9bc1cc;
      --discord: #5865f2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(31, 143, 163, 0.08), transparent 28%),
        linear-gradient(180deg, #090b11 0%, #0b0d14 100%);
      color: white;
    }

    header {
      padding: 32px 20px;
      background: linear-gradient(90deg, #1a4650, #225c68);
      text-align: center;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0;
      font-size: 2.8rem;
      color: #dff8ff;
      letter-spacing: 0.2px;
    }

    .sub {
      margin-top: 10px;
      opacity: 0.92;
      color: #d0eef5;
      font-size: 1rem;
      line-height: 1.45;
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 16px 50px;
    }

    .top-links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin: 0 auto 18px;
      padding: 0 4px;
    }

    .top-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 150px;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.98rem;
      color: #f4fbff;
      background: linear-gradient(180deg, rgba(23, 26, 32, 0.96), rgba(17, 19, 24, 0.96));
      border: 1px solid rgba(126, 201, 222, 0.14);
      box-shadow:
        0 0 16px rgba(0, 0, 0, 0.18),
        inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .top-links a:hover {
      transform: translateY(-1px);
      border-color: rgba(126, 201, 222, 0.28);
      box-shadow:
        0 0 20px rgba(0, 0, 0, 0.22),
        0 0 18px rgba(126, 201, 222, 0.08);
    }

    .top-links a.active {
      background: linear-gradient(90deg, rgba(126, 201, 222, 0.22), rgba(255, 106, 0, 0.16));
      border-color: rgba(126, 201, 222, 0.24);
    }

    .top-links a.discord {
      background: linear-gradient(90deg, rgba(88, 101, 242, 0.22), rgba(126, 201, 222, 0.14));
      border-color: rgba(88, 101, 242, 0.28);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .range-btn {
      background: linear-gradient(180deg, rgba(23, 26, 32, 0.96), rgba(17, 19, 24, 0.96));
      color: white;
      border: 1px solid rgba(126, 201, 222, 0.16);
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      font-weight: 600;
    }

    .range-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(126, 201, 222, 0.28);
    }

    .range-btn.active {
      background: linear-gradient(90deg, #ff6a00, #ff8c1a);
      border-color: transparent;
      font-weight: 700;
      box-shadow: 0 0 14px rgba(255, 106, 0, 0.24);
    }

    .panel {
      background: linear-gradient(180deg, var(--panel-top), var(--panel-bottom));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 22px;
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.18);
    }

    .panel h2 {
      margin: 0 0 14px;
      color: var(--teal);
      font-size: 1.8rem;
    }

    .chart-wrap {
      position: relative;
      height: 400px;
      overflow: hidden;
      border-radius: 14px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
    }

    .chart-tooltip {
      position: absolute;
      display: none;
      pointer-events: none;
      z-index: 5;
      min-width: 130px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(10, 13, 19, 0.96);
      border: 1px solid rgba(126, 201, 222, 0.22);
      box-shadow: 0 0 18px rgba(0, 0, 0, 0.28), 0 0 14px rgba(126, 201, 222, 0.10);
      color: #f4fbff;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .chart-tooltip strong { color: #86c8da; }

    svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .note {
      text-align: center;
      color: #a9d6e3;
      opacity: 0.85;
      margin-top: 14px;
      font-size: 0.95rem;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 2.2rem;
      }

      .top-links {
        gap: 10px;
      }

      .top-links a {
        min-width: 135px;
        padding: 11px 15px;
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Adult ASA Cluster</h1>
    <div class="sub" id="subtitle">Loading cluster activity data...</div>
  </header>

  <div class="wrap">
    <div class="top-links" data-shared-nav data-page="tracker"></div>

    <div class="controls" id="controls">
      <button class="range-btn" data-range="24h">Day</button>
      <button class="range-btn active" data-range="72h">3 Days</button>
      <button class="range-btn" data-range="7d">Week</button>
      <button class="range-btn" data-range="30d">Month</button>
      <button class="range-btn" data-range="365d">Year</button>
    </div>

    <div class="panel">
      <h2>Cluster Activity</h2>
      <div class="chart-wrap">
        <svg id="trendChart" viewBox="0 0 1200 400" preserveAspectRatio="none"></svg>
        <div id="chartTooltip" class="chart-tooltip"></div>
      </div>
      <div class="note">Y-axis shows total players online across the cluster.</div>
    </div>
  </div>

  <script>
    const API_BASE = "https://aasa-discord-bot-v-20-production.up.railway.app";
    let currentRange = "72h";
    let latestTrendPoints = [];

    function fmtDate(ms) {
      return new Date(ms).toLocaleString();
    }

    function fmtShort(ms) {
      return new Date(ms).toLocaleDateString([], {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function fmtTooltipTime(ms) {
      return new Date(ms).toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function setActiveRange(range) {
      currentRange = range;
      document.querySelectorAll(".range-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.range === range);
      });
    }

    function renderTrend(svg, trend, startMs, endMs) {
      const width = 1200;
      const height = 400;
      const padLeft = 70;
      const padRight = 20;
      const padTop = 20;
      const padBottom = 50;
      const plotW = width - padLeft - padRight;
      const plotH = height - padTop - padBottom;

      const maxVal = Math.max(1, ...trend.map(p => Number(p.value || 0)));
      const xFor = (t) => padLeft + ((t - startMs) / (endMs - startMs)) * plotW;
      const yFor = (v) => padTop + plotH - (v / maxVal) * plotH;

      let areaPath = "";
      let linePath = "";

      trend.forEach((point, i) => {
        const x = xFor(point.time);
        const y = yFor(point.value);

        if (i === 0) {
          areaPath += `M ${x} ${padTop + plotH} L ${x} ${y} `;
          linePath += `M ${x} ${y} `;
        } else {
          areaPath += `L ${x} ${y} `;
          linePath += `L ${x} ${y} `;
        }
      });

      const lastX = trend.length ? xFor(trend[trend.length - 1].time) : padLeft;
      areaPath += `L ${lastX} ${padTop + plotH} Z`;

      const gridLines = [];
      const stepCount = Math.min(8, Math.max(3, Math.ceil(maxVal)));
      const stepSize = Math.max(1, Math.ceil(maxVal / stepCount));

      for (let value = 0; value <= maxVal; value += stepSize) {
        const y = yFor(value);

        gridLines.push(`
          <line x1="${padLeft}" y1="${y}" x2="${width - padRight}" y2="${y}"
            stroke="rgba(255,255,255,0.08)" stroke-dasharray="4 6"/>
          <text x="${padLeft - 10}" y="${y + 4}"
            fill="#9eb9c3" font-size="14" text-anchor="end">${value}</text>
        `);
      }

      if (maxVal % stepSize !== 0) {
        const y = yFor(maxVal);
        gridLines.push(`
          <line x1="${padLeft}" y1="${y}" x2="${width - padRight}" y2="${y}"
            stroke="rgba(255,255,255,0.08)" stroke-dasharray="4 6"/>
          <text x="${padLeft - 10}" y="${y + 4}"
            fill="#9eb9c3" font-size="14" text-anchor="end">${maxVal}</text>
        `);
      }

      const xLabels = [];
      for (let i = 0; i <= 6; i++) {
        const t = startMs + ((endMs - startMs) / 6) * i;
        const x = xFor(t);
        xLabels.push(`
          <line x1="${x}" y1="${padTop}" x2="${x}" y2="${padTop + plotH}"
            stroke="rgba(255,255,255,0.06)" stroke-dasharray="4 6"/>
          <text x="${x}" y="${height - 12}" fill="#9eb9c3" font-size="13" text-anchor="middle">${fmtShort(t)}</text>
        `);
      }

      latestTrendPoints = trend.map((point) => ({
        time: point.time,
        value: Number(point.value || 0),
        x: xFor(point.time),
        y: yFor(Number(point.value || 0)),
      }));

      svg.innerHTML = `
        ${gridLines.join("")}
        ${xLabels.join("")}
        <path d="${areaPath}" fill="rgba(255, 106, 0, 0.22)"></path>
        <path d="${linePath}" fill="none" stroke="#ff6a00" stroke-width="3"></path>
      `;
    }

    function setupChartTooltip() {
      const chartWrap = document.querySelector(".chart-wrap");
      const tooltip = document.getElementById("chartTooltip");
      if (!chartWrap || !tooltip) return;

      chartWrap.addEventListener("mousemove", (event) => {
        if (!latestTrendPoints.length) return;

        const rect = chartWrap.getBoundingClientRect();
        const scaleX = 1200 / rect.width;
        const mouseX = (event.clientX - rect.left) * scaleX;

        let nearest = latestTrendPoints[0];
        let nearestDistance = Math.abs(mouseX - nearest.x);

        for (const point of latestTrendPoints) {
          const distance = Math.abs(mouseX - point.x);
          if (distance < nearestDistance) {
            nearest = point;
            nearestDistance = distance;
          }
        }

        tooltip.innerHTML = `<strong>Time:</strong> ${fmtTooltipTime(nearest.time)}<br><strong>Players:</strong> ${nearest.value}`;
        tooltip.style.display = "block";

        const tooltipWidth = tooltip.offsetWidth || 130;
        const left = Math.min(Math.max(event.clientX - rect.left + 14, 8), rect.width - tooltipWidth - 8);
        const top = Math.max(event.clientY - rect.top - 52, 8);

        tooltip.style.left = `${left}px`;
        tooltip.style.top = `${top}px`;
      });

      chartWrap.addEventListener("mouseleave", () => {
        tooltip.style.display = "none";
      });
    }

    async function loadTracker(range) {
      setActiveRange(range);

      const subtitle = document.getElementById("subtitle");
      subtitle.textContent = "Loading cluster activity data...";

      const res = await fetch(`${API_BASE}/api/tracker?range=${encodeURIComponent(range)}`);
      if (!res.ok) throw new Error("Failed to load cluster activity data");

      const data = await res.json();

      subtitle.textContent = `Showing total players online from ${fmtDate(data.startMs)} to ${fmtDate(data.endMs)}`;
      renderTrend(document.getElementById("trendChart"), data.trend || [], data.startMs, data.endMs);
    }

    document.getElementById("controls").addEventListener("click", async (e) => {
      const btn = e.target.closest(".range-btn");
      if (!btn) return;

      try {
        await loadTracker(btn.dataset.range);
      } catch (err) {
        console.error(err);
        document.getElementById("subtitle").textContent = "Could not load cluster activity data.";
      }
    });

    setupChartTooltip();

    loadTracker(currentRange).catch((err) => {
      console.error(err);
      document.getElementById("subtitle").textContent = "Could not load cluster activity data.";
    });
  </script>
  <script src="./shared-nav.js"></script>
</body>
</html>
