<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Adult ASA Player Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root{--bg:#0b0d14;--panel-top:#171a20;--panel-bottom:#111318;--border:rgba(126,201,222,.12);--teal:#86c8da;--orange:#ff7a14;--green:#6effb3;--muted:#9bc1cc}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,rgba(31,143,163,.08),transparent 28%),linear-gradient(180deg,#090b11 0%,#0b0d14 100%);color:#fff}header{padding:30px 20px;text-align:center;background:linear-gradient(90deg,#163e47,#214f59);box-shadow:0 8px 30px rgba(0,0,0,.35)}h1{margin:0;font-size:3rem;color:#dff8ff}.sub{margin-top:12px;color:#d0eef5}.wrap{max-width:1300px;margin:0 auto;padding:26px 18px 50px}.top-nav{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;margin:0 auto 26px}.top-nav-btn{display:inline-flex;align-items:center;justify-content:center;min-width:170px;padding:12px 18px;border-radius:999px;text-decoration:none;font-weight:700;color:#f4fbff;background:linear-gradient(180deg,rgba(23,26,32,.96),rgba(17,19,24,.96));border:1px solid rgba(126,201,222,.14)}.top-nav-btn.primary{background:linear-gradient(90deg,rgba(126,201,222,.24),rgba(255,122,20,.18))}.top-nav-btn.discord{background:linear-gradient(90deg,rgba(88,101,242,.22),rgba(126,201,222,.14))}.panel,.card{background:linear-gradient(180deg,var(--panel-top),var(--panel-bottom));border:1px solid var(--border);border-radius:22px;padding:22px;box-shadow:0 0 18px rgba(0,0,0,.18)}.hero{background:linear-gradient(90deg,rgba(126,201,222,.28),rgba(255,122,20,.22));border:1px solid rgba(126,201,222,.24);border-radius:22px;padding:26px;margin-bottom:18px}.hero h2{font-size:2rem;margin:0 0 8px}.pill-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}.pill{border-radius:999px;padding:9px 13px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-weight:800;color:#e8fbff}.pill.live{color:var(--green);background:rgba(0,255,140,.08);border-color:rgba(0,255,140,.35)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:14px}.card strong{color:#ffb070}.section-title{font-size:1.25rem;font-weight:900;color:var(--teal);margin:22px 0 10px}.searchbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}.input{flex:1;min-width:260px;padding:14px 16px;border-radius:14px;border:1px solid rgba(126,201,222,.16);background:rgba(255,255,255,.04);color:white;font-size:1rem}.btn{cursor:pointer;border-radius:999px;padding:12px 18px;font-weight:900;border:1px solid rgba(126,201,222,.24);background:linear-gradient(90deg,rgba(126,201,222,.22),rgba(255,122,20,.14));color:white;text-decoration:none}.empty{color:var(--muted);text-align:center;padding:28px}.aka{color:#d0eef5;line-height:1.55}.small{color:#9bc1cc;font-size:.92rem;line-height:1.5}@media(max-width:700px){h1{font-size:2.35rem}.hero h2{font-size:1.55rem}.top-nav-btn{min-width:145px}}
  </style>
<link rel="stylesheet" href="./adultasa-theme.css?v=verified-role-sync-3" />
</head>
<body>
<div class="top-command">
  <div class="top-command-inner">
    <a class="brand-mark" href="./index.html" aria-label="Adult ASA Command Center">
      <div class="brand-orb">
        <img class="brand-orb-img" data-adultasa-icon alt="Adult ASA Logo">
      </div>
      <div class="brand-title">Command Center</div>
    </a>
    <nav class="utility-nav" aria-label="Utility navigation">
      <a href="./link-survivor.html">Link Survivor</a>
      <a href="./admin.html" class="admin-link">Admin Panel</a>
      <a href="https://discord.gg/adultasa" target="_blank" class="discord" rel="noopener">Join Our Discord</a>
    </nav>
  </div>
</div>
<div class="asa-page-shell">
<section class="asa-page-hero" aria-labelledby="asa-page-title">
  <div class="asa-hero-content">
    <div class="asa-eyebrow"><span class="asa-pulse-dot"></span><span>🪪 Command System</span></div>
    <h1 id="asa-page-title">Player Profile</h1>
    <p class="asa-page-copy" id="subtitle">View one survivor’s full profile, linked accounts, maps visited, and recent sessions.</p>
  </div>
</section>

<div class="wrap">
  <div class="top-nav" data-shared-nav data-page="profile"></div>
  <div class="searchbar"><input class="input" id="profileSearch" placeholder="Search survivor name" /><button class="btn" id="searchBtn">View Profile</button></div>
  <div id="profileRoot" class="panel"><div class="empty">Loading...</div></div>
</div>
<script>
const API_BASE="https://aasa-discord-bot-v-20-production.up.railway.app";

const ROLE_TRUTH_CACHE_KEY="adultasa_role_truth_cache_v3";
function normalizeAdultAsaRole(role){
  const clean=String(role||"").trim().toLowerCase();
  if(clean==="owner")return"Owner";
  if(clean==="admin")return"Admin";
  if(clean==="vip")return"VIP";
  if(clean==="staff"||clean==="mod"||clean==="moderator")return"Mod";
  return "";
}
function cachedRoleForName(name){
  try{
    const cache=JSON.parse(localStorage.getItem(ROLE_TRUTH_CACHE_KEY)||"{}");
    const hit=cache[String(name||"").trim().toLowerCase()];
    return normalizeAdultAsaRole(hit&&hit.role);
  }catch(error){return "";}
}
function verifiedProfileRole(p){
  const role=normalizeAdultAsaRole(p.role||p.staffRole||p.rank||"");
  if(role&&(p.isMod||p.isOwner||p.isVip||p.isStaff||role==="Owner"||role==="Admin"||role==="VIP"))return role;
  return cachedRoleForName(p.player||p.name);
}

function fmtDate(v){return v?new Date(v).toLocaleString():"Unknown"}
function fmtAgo(v){if(!v)return"Unknown";const m=Math.floor(Math.max(0,Date.now()-new Date(v).getTime())/60000);if(m<1)return"just now";if(m<60)return`${m}m ago`;const h=Math.floor(m/60);if(h<24)return`${h}h ${m%60?`${m%60}m`:""}`.trim()+" ago";const d=Math.floor(h/24);return`${d}d ${h%24?`${h%24}h`:""}`.trim()+" ago"}
function fmtDurationMs(ms){const mins=Math.round(Number(ms||0)/60000);return`${Math.floor(mins/60)}h ${mins%60}m`}
function esc(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#039;")}
function getQueryName(){return new URLSearchParams(location.search).get("name")||new URLSearchParams(location.search).get("id")||""}
function render(p){document.getElementById("subtitle").textContent=`${p.player} profile`;document.getElementById("profileSearch").value=p.player||"";document.getElementById("profileRoot").innerHTML=`
  <div class="hero"><h2>${esc(p.player)}</h2><div class="aka">${(p.aka||[]).length?`AKA: ${p.aka.map(esc).join(", ")}`:"No AKA names linked yet."}</div><div class="pill-row"><span class="pill">${Number(p.totalHours||0).toFixed(2)}h total</span><span class="pill">${p.timesJoined||0} joins</span><span class="pill">${(p.linkedNames||[]).length} linked account${(p.linkedNames||[]).length===1?"":"s"}</span>${p.currentServer?`<span class="pill live">Online on ${esc(p.currentServer)}</span>`:`<span class="pill">Last seen ${fmtAgo(p.lastSeenIso||p.lastSeen)}</span>`}${verifiedProfileRole(p)?`<span class="pill role-pill ${verifiedProfileRole(p).toLowerCase()}">${esc(verifiedProfileRole(p))}</span>`:""}</div></div>
  <div class="grid"><div class="card"><strong>First Seen</strong><br>${fmtDate(p.firstSeen)}</div><div class="card"><strong>Last Seen</strong><br>${fmtDate(p.lastSeenIso||p.lastSeen)}</div><div class="card"><strong>Current Map</strong><br>${esc(p.currentServer||"Offline")}</div></div>
  <div class="section-title">Linked Accounts</div><div class="grid">${(p.accounts||[]).map(a=>`<div class="card"><strong>${esc(a.name)}</strong><br>${Number(a.totalHours||0).toFixed(2)}h<br><span class="small">${a.currentServer?`Online on ${esc(a.currentServer)}`:`Last seen ${fmtDate(a.lastSeen)}`}</span></div>`).join("")||`<div class="card">No linked accounts.</div>`}</div>
  <div class="section-title">Maps Visited</div><div class="grid">${(p.mapTotals||[]).map(m=>`<div class="card"><strong>${esc(m.map)}</strong><br>${Number(m.hours||0).toFixed(2)}h</div>`).join("")||`<div class="card">No map history yet.</div>`}</div>
  <div class="section-title">Recent Sessions</div><div class="grid">${(p.recentSessions||[]).slice(0,12).map(s=>`<div class="card"><strong>${esc(s.server)}</strong><br>${fmtDate(s.start)}<br><span class="small">${s.isActive?"Still online":`Stayed ${fmtDurationMs(s.durationMs)}`}</span></div>`).join("")||`<div class="card">No recent sessions yet.</div>`}</div>`}
function normalizeProfileFromPlayer(player){
  return {
    player: player.player || player.name || "Unknown",
    aka: player.aka || [],
    linkedNames: player.linkedNames || [],
    accounts: player.accounts || [],
    totalHours: Number(player.totalHours || 0),
    timesJoined: player.timesJoined || player.joins || 0,
    currentServer: player.currentServer || "",
    lastSeenIso: player.lastSeenIso || player.lastSeen || "",
    lastSeen: player.lastSeen || player.lastSeenIso || "",
    firstSeen: player.firstSeen || "",
    isMod: Boolean(player.isMod || player.isStaff),
    role: player.role || "",
    mapTotals: player.mapTotals || [],
    recentSessions: player.recentSessions || []
  };
}

function findBestPlayerMatch(players, name){
  const cleanName = String(name || "").trim().toLowerCase();
  if (!cleanName) return players[0] || null;

  return players.find((player) => String(player.player || player.name || "").trim().toLowerCase() === cleanName)
    || players.find((player) => String(player.player || player.name || "").trim().toLowerCase().includes(cleanName))
    || players[0]
    || null;
}

async function loadProfileFromPlayersEndpoint(name){
  const res = await fetch(`${API_BASE}/api/players?q=${encodeURIComponent(name || "")}`);
  if (!res.ok) throw new Error("Failed to load players endpoint");

  const data = await res.json();
  const player = findBestPlayerMatch(data.players || [], name);
  if (!player) throw new Error("No matching player found");

  render(normalizeProfileFromPlayer(player));
}

async function loadProfile(name){
  const root=document.getElementById("profileRoot");
  root.innerHTML='<div class="empty">Loading...</div>';
  document.getElementById("profileSearch").value=name||"";

  if(!name){
    root.innerHTML='<div class="empty">Search a survivor name above.</div>';
    document.getElementById("subtitle").textContent="Search a player profile";
    return;
  }

  try{
    const res=await fetch(`${API_BASE}/api/player-profile?name=${encodeURIComponent(name)}`);
    if(res.ok){
      const data=await res.json();
      if(data.profile){
        render(data.profile);
        return;
      }
    }
  }catch(error){
    console.warn("Detailed profile endpoint failed, trying player list fallback.", error);
  }

  try{
    await loadProfileFromPlayersEndpoint(name);
  }catch(error){
    console.error(error);
    root.innerHTML='<div class="empty">Profile not found. Try checking the spelling or open the player from Cluster Status again.</div>';
    document.getElementById("subtitle").textContent="Search a player profile";
  }
}

document.getElementById("searchBtn").addEventListener("click",()=>{const name=document.getElementById("profileSearch").value.trim();if(name)location.href=`./profile.html?name=${encodeURIComponent(name)}`});document.getElementById("profileSearch").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("searchBtn").click()});loadProfile(getQueryName());
</script><script src="./shared-nav.js?v=verified-role-sync-3"></script>
</div>
</body></html>
